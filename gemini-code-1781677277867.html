<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在轉跳預約系統...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loading { text-align: center; color: #555; }
    </style>
</head>
<body>
    <div class="loading">
        <p>正在為您取得身份並前往預約...</p>
    </div>

    <script>
        // 初始化 LIFF
        liff.init({ liffId: "2010400798-bwky55Rb" })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    liff.getProfile().then(profile => {
                        const userUID = profile.userId;
                        
                        // 設定微軟 Bookings 網址 (已移除預設參數以確保乾淨跳轉)
                        const baseUrl = "https://outlook.office.com/book/W3_DrCHL@femh.org.tw/";
                        
                        // 組合網址：使用自訂欄位 ID 作為參數名稱
                        // 將參數傳遞給微軟 Bookings 表單
                        const finalUrl = `${baseUrl}?84f4ca14-6197-40ef-a353-5ff99dfc118b=${userUID}`;
                        
                        // 執行跳轉
                        window.location.href = finalUrl;
                    }).catch((err) => {
                        alert("無法取得使用者資料: " + err.message);
                    });
                }
            })
            .catch((err) => {
                alert("LIFF 初始化失敗: " + err.message);
            });
    </script>
</body>
</html>
