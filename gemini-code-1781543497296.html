<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>正在前往預約系統...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <p>正在為您安全連線至預約系統，請稍候...</p>
    </div>

    <script>
        // 初始化 LIFF，請將下面的 XXXXX-XXXXX 替換成您的 LIFF ID
        liff.init({ liffId: "XXXXX-XXXXX" })
            .then(() => {
                // 檢查使用者是否已經在 LINE 中登入
                if (!liff.isLoggedIn()) {
                    // 若未登入，強制跳出 LINE 登入畫面
                    liff.login();
                } else {
                    // 登入成功，取得用戶 Profile 資料
                    liff.getProfile()
                        .then(profile => {
                            const userUID = profile.userId; // 這就是您朝思暮想的 LINE UID！

                            // 您的 Microsoft Bookings 原始預約網址
                            const bookingsBaseUrl = "https://outlook.office365.com/owa/calendar/您的Bookings網址";
                            
                            /* 透過網址參數 (Query String) 將 UID 帶過去
                              注意：微軟 Bookings 支援透過 URL 參數預填表單。
                              您可以將參數附加在網址後方，例如：&遺留欄位名稱=值
                            */
                            const finalUrl = `${bookingsBaseUrl}&LINE_UID=${userUID}`;

                            // 自動跳轉到帶有 UID 的 Bookings 預約網頁
                            window.location.href = finalUrl;
                        })
                        .catch((err) => {
                            console.error("取得資料失敗", err);
                        });
                }
            })
            .catch((err) => {
                console.error("LIFF 初始化失敗", err);
            });
    </script>
</body>
</html>
