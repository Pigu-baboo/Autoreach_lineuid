<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>除錯中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div id="debug" style="padding: 20px; font-size: 14px; word-break: break-all;">
        正在初始化...
    </div>

    <script>
        const debugDiv = document.getElementById('debug');
        function log(msg) { debugDiv.innerHTML += "<br>➔ " + msg; }

        liff.init({ liffId: "2010400798-bwky55Rb" })
            .then(() => {
                log("LIFF 初始化成功");
                if (!liff.isLoggedIn()) {
                    log("未登入，執行 liff.login()");
                    liff.login();
                } else {
                    log("已登入，準備抓取 Profile");
                    liff.getProfile().then(profile => {
                        log("抓到 UID: " + profile.userId);
                        const finalUrl = "https://outlook.office.com/book/W3_DrCHL@femh.org.tw/?84f4ca14-6197-40ef-a353-5ff99dfc118b=" + profile.userId;
                        log("準備跳轉: " + finalUrl);
                        
                        // 使用最基礎的跳轉，如果這行無效，代表 LINE 鎖死頁面
                        window.location.href = finalUrl;
                    }).catch(err => {
                        log("錯誤 (getProfile): " + JSON.stringify(err));
                    });
                }
            })
            .catch(err => {
                log("錯誤 (init): " + JSON.stringify(err));
            });
    </script>
</body>
</html>
