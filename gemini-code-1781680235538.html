<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>準備中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div style="text-align:center; padding: 20px;">正在啟動預約系統...</div>

    <script>
        liff.init({ liffId: "2010400798-bwky55Rb" })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    liff.getProfile().then(profile => {
                        const userUID = profile.userId;
                        const baseUrl = "https://outlook.office.com/book/W3_DrCHL@femh.org.tw/";
                        const finalUrl = baseUrl + "?84f4ca14-6197-40ef-a353-5ff99dfc118b=" + userUID;
                        
                        // 【關鍵修改】：改用 liff.openWindow 進行強制跳轉
                        // 參數說明: url: 目標網址, external: true (強制用外部瀏覽器開啟)
                        liff.openWindow({
                            url: finalUrl,
                            external: true
                        });
                        
                    }).catch((err) => {
                        document.body.innerHTML = "錯誤: " + err;
                    });
                }
            })
            .catch((err) => {
                document.body.innerHTML = "LIFF 初始化失敗: " + err;
            });
    </script>
</body>
</html>
